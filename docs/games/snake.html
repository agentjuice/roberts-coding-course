<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0000ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
  canvas { cursor: pointer; }
  #info { color: #00ff00; font-size: 14px; margin-top: 8px; font-weight: 700; font-family: monospace; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="info">Arrow keys to move. Space to restart.</div>
<script>
const COLS = 20, ROWS = 15, CELL = 21, OFFSET = 25;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = COLS * CELL + OFFSET * 2;
canvas.height = ROWS * CELL + OFFSET + 50;

let snake, direction, apple, gameOver, score, tickTimer;
const TICK = 120;

function init() {
  snake = [{x: 0, y: 0}];
  direction = 'right';
  apple = null;
  gameOver = false;
  score = 0;
  spawnApple();
  if (tickTimer) clearInterval(tickTimer);
  tickTimer = setInterval(update, TICK);
  draw();
}

function spawnApple() {
  apple = {
    x: Math.floor(Math.random() * COLS),
    y: Math.floor(Math.random() * ROWS)
  };
}

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') { init(); return; }
  if (gameOver) return;
  if (e.key === 'ArrowUp' && direction !== 'down') direction = 'up';
  if (e.key === 'ArrowDown' && direction !== 'up') direction = 'down';
  if (e.key === 'ArrowLeft' && direction !== 'right') direction = 'left';
  if (e.key === 'ArrowRight' && direction !== 'left') direction = 'right';
  e.preventDefault();
});

// Touch controls
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
});
canvas.addEventListener('touchend', (e) => {
  if (gameOver) { init(); return; }
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && direction !== 'left') direction = 'right';
    else if (dx < -20 && direction !== 'right') direction = 'left';
  } else {
    if (dy > 20 && direction !== 'up') direction = 'down';
    else if (dy < -20 && direction !== 'down') direction = 'up';
  }
  e.preventDefault();
});

function update() {
  if (gameOver) return;

  const head = snake[0];
  let nx = head.x, ny = head.y;
  if (direction === 'up') ny--;
  if (direction === 'down') ny++;
  if (direction === 'left') nx--;
  if (direction === 'right') nx++;

  // Wall collision
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
    gameOver = true;
    draw();
    return;
  }

  // Self collision
  for (const seg of snake) {
    if (seg.x === nx && seg.y === ny) {
      gameOver = true;
      draw();
      return;
    }
  }

  snake.unshift({x: nx, y: ny});

  // Apple check
  if (nx === apple.x && ny === apple.y) {
    score++;
    spawnApple();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  // Blue background
  ctx.fillStyle = '#0000ff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid cells (black)
  for (let x = 0; x < COLS; x++) {
    for (let y = 0; y < ROWS; y++) {
      ctx.fillStyle = '#000000';
      ctx.fillRect(x * CELL + OFFSET, y * CELL + OFFSET, CELL - 1, CELL - 1);
    }
  }

  // Apple (red)
  if (apple) {
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(apple.x * CELL + OFFSET, apple.y * CELL + OFFSET, CELL - 1, CELL - 1);
  }

  // Snake (yellow)
  for (const seg of snake) {
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(seg.x * CELL + OFFSET, seg.y * CELL + OFFSET, CELL - 1, CELL - 1);
  }

  // Score
  ctx.fillStyle = '#00ff00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('SCORE: ' + score, COLS * CELL - 50, OFFSET - 6);

  // Game over
  if (gameOver) {
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 18px monospace';
    ctx.fillText('GAME OVER', OFFSET, ROWS * CELL + OFFSET + 25);
  }
}

init();
canvas.focus();
</script>
</body>
</html>
