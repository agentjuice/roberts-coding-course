<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0000ff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: monospace; }
  canvas { cursor: pointer; }
  #status { color: #00ff00; font-size: 16px; margin-top: 8px; font-weight: 700; font-family: monospace; }
  #restart { display: none; margin-top: 8px; padding: 6px 20px; background: #00ff00; color: #000; border: none; font-size: 14px; font-weight: 700; cursor: pointer; font-family: monospace; }
  #restart:hover { background: #00cc00; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="status">Player 1's turn</div>
<button id="restart" onclick="init()">Play Again</button>
<script>
const ROWS = 6, COLS = 6, SIZE = 50, PAD = 10;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const restartBtn = document.getElementById('restart');

canvas.width = COLS * SIZE + PAD * 2;
canvas.height = ROWS * SIZE + PAD * 2 + 30;

let board, player, winner, animating, animCol, animRow, animY;

function init() {
  board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
  player = 1;
  winner = 0;
  animating = false;
  restartBtn.style.display = 'none';
  status.textContent = "Player 1's turn";
  status.style.color = '#ff4444';
  draw();
}

function getCol(x) {
  return Math.floor((x - PAD) / SIZE);
}

canvas.addEventListener('click', (e) => {
  if (winner || animating) return;
  const rect = canvas.getBoundingClientRect();
  const col = getCol(e.clientX - rect.left);
  if (col < 0 || col >= COLS) return;
  
  // Find empty row
  let row = -1;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r][col] === 0) { row = r; break; }
  }
  if (row === -1) return;
  
  // Animate drop
  animating = true;
  animCol = col;
  animRow = row;
  animY = 30;
  animateDrop();
});

canvas.addEventListener('mousemove', (e) => {
  if (winner || animating) return;
  const rect = canvas.getBoundingClientRect();
  const col = getCol(e.clientX - rect.left);
  draw(col);
});

function animateDrop() {
  const targetY = animRow * SIZE + SIZE/2 + 30;
  animY += 12;
  if (animY >= targetY) {
    animY = targetY;
    board[animRow][animCol] = player;
    animating = false;
    
    if (checkWin(animRow, animCol)) {
      winner = player;
      status.textContent = `Player ${player} wins! 🎉`;
      status.style.color = '#39ff14';
      restartBtn.style.display = 'inline-block';
    } else if (board[0].every((_, c) => board[0][c] !== 0)) {
      winner = -1;
      status.textContent = "It's a draw!";
      status.style.color = '#ffcc00';
      restartBtn.style.display = 'inline-block';
    } else {
      player = player === 1 ? 2 : 1;
      status.textContent = `Player ${player}'s turn`;
      status.style.color = player === 1 ? '#ff4444' : '#ffcc00';
    }
    draw();
    return;
  }
  draw();
  // Draw falling chip
  ctx.beginPath();
  ctx.arc(animCol * SIZE + SIZE/2 + PAD, animY, SIZE/2 - 4, 0, Math.PI * 2);
  ctx.fillStyle = player === 1 ? '#ff0000' : '#ffff00';
  ctx.fill();
  requestAnimationFrame(animateDrop);
}

function checkWin(r, c) {
  const dirs = [[0,1],[1,0],[1,1],[1,-1]];
  for (const [dr, dc] of dirs) {
    let count = 1;
    for (let i = 1; i < 4; i++) {
      const nr = r + dr*i, nc = c + dc*i;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) count++;
      else break;
    }
    for (let i = 1; i < 4; i++) {
      const nr = r - dr*i, nc = c - dc*i;
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) count++;
      else break;
    }
    if (count >= 4) return true;
  }
  return false;
}

function draw(hoverCol) {
  // Blue background (matches Python version)
  ctx.fillStyle = '#0000ff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Column numbers in green
  ctx.fillStyle = '#00ff00';
  ctx.font = 'bold 14px monospace';
  ctx.textAlign = 'center';
  for (let c = 0; c < COLS; c++) {
    ctx.fillText(c + 1, c * SIZE + SIZE/2 + PAD, 18);
  }
  
  // Cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const x = c * SIZE + SIZE/2 + PAD;
      const y = r * SIZE + SIZE/2 + 30;
      
      ctx.beginPath();
      ctx.arc(x, y, SIZE/2 - 4, 0, Math.PI * 2);
      
      if (board[r][c] === 0) {
        ctx.fillStyle = '#000000';
      } else if (board[r][c] === 1) {
        ctx.fillStyle = '#ff0000';
      } else {
        ctx.fillStyle = '#ffff00';
      }
      ctx.fill();
    }
  }
  
  // Winner/draw text in green at bottom
  if (winner > 0) {
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('WINNER - PLAYER: ' + winner, PAD, ROWS * SIZE + 55);
  } else if (winner < 0) {
    ctx.fillStyle = '#00ff00';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('DRAW', PAD, ROWS * SIZE + 55);
  }
}

init();
</script>
</body>
</html>
