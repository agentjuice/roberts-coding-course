  { mx: 0, my: 0 }, { mx: 1, my: 0 }, { mx: 2, my: 0 }, { mx: 2, my: 1 }, { mx: 3, my: 1 }

const ITEM_TYPES = ['health_potion', 'speed_boost', 'power_sword'];
const ITEM_COLORS = { health_potion: '#e03232', speed_boost: '#32dce0', power_sword: '#e09632' };
const ITEM_NAMES = { health_potion: 'Health Pot', speed_boost: 'Speed Boost', power_sword: 'Power Sword' };

// Boss phase cycle: chase, charge, rest, chase, summon, charge, rest (then repeats)
const BOSS_PHASE_CYCLE = ['chase', 'charge', 'rest', 'chase', 'summon', 'charge', 'rest'];
const BOSS_PHASE_DURATIONS = { chase: 150, charge: 60, rest: 60, summon: 60 };

let game;

function createEnemy(e) {
  const isZ = e.type === 'zombie';
  return {
    type: e.type, x: e.x, y: e.y,
    hp: isZ ? 6 : 4, maxHp: isZ ? 6 : 4,
    moveTimer: 0, moveInterval: isZ ? 20 : 12,
    deathTimer: 0, alive: true, damaged: false, damageTimer: 0
  };
}

function createBoss() {
  return {
    x: 10, y: 6, // top-left of 2x2
    hp: 50, maxHp: 50,
    alive: true,
    phaseIndex: 0,
    phaseTimer: BOSS_PHASE_DURATIONS[BOSS_PHASE_CYCLE[0]],
    chargeDir: { dx: 0, dy: 0 },
    summonCount: 0, // max 2 summon activations
    summonedThisPhase: false,
    contactCd: 0,
    hitFlash: 0,
    deathTimer: -1, // -1 = not dying
    moveTimer: 0
  };
}

function initGame() {
  game = {
    currentRoom: 0,
    player: { x: 2, y: 2, facing: 'right', hp: 20, maxHp: 20, attackCd: 0, attackAnim: 0, moveCd: 0, dmgCd: 0, dmgFlash: 0 },
    inventory: [],
    kills: 0,
    itemsUsed: 0,
    speedTimer: 0,
    powerTimer: 0,
    frame: 0,
    flashTimer: 0,
    gameOver: false,
    victory: false,
    visited: [true, false, false, false, false],
    roomState: [],
    boss: null,
    bossSpawned: false,
    keys: {},
    touchStart: null,
    startTime: Date.now(),
    playTime: 0
  };
  for (let i = 0; i < 5; i++) {
    game.roomState.push({
      enemies: i === 0 ? ROOM_ENEMIES_INIT[0].map(createEnemy) : null,
      chests: ROOM_CHESTS_INIT[i].map(c => ({ x: c.x, y: c.y, opened: false })),
      items: []
    });
  }
}

function getMap() { return ROOM_MAPS[game.currentRoom]; }
function getRoomState() { return game.roomState[game.currentRoom]; }

function isWalkable(x, y) {
  if (x < 0 || y < 0 || x >= COLS || y >= ROWS) return false;
  const tile = getMap()[y][x];
  return tile === 0 || tile === 2 || tile === 3;
}

function enemyAt(x, y, exclude) {
  const rs = getRoomState();
  if (rs.enemies) {
    const found = rs.enemies.find(e => e.alive && e.x === x && e.y === y && e !== exclude);
    if (found) return found;
  }
  return null;
}

// Check if a tile overlaps the boss's 2x2 area
function bossOccupies(x, y) {
  const b = game.boss;
  if (!b || !b.alive || game.currentRoom !== 4) return false;
  return x >= b.x && x <= b.x + 1 && y >= b.y && y <= b.y + 1;
}

function dropItem(x, y) {
  if (Math.random() < 0.4) {
    const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
    getRoomState().items.push({ type, x, y });
  }
}

function useItem(idx) {
  if (idx >= game.inventory.length) return;
  const item = game.inventory[idx];
  game.inventory.splice(idx, 1);
  game.itemsUsed++;
  if (item === 'health_potion') {
    game.player.hp = Math.min(game.player.maxHp, game.player.hp + 5);
  } else if (item === 'speed_boost') {
    game.speedTimer = 150;
  } else if (item === 'power_sword') {
    game.powerTimer = 150;
  }
}

function tryPickupItem() {
  const rs = getRoomState();
  const p = game.player;
  for (let i = rs.items.length - 1; i >= 0; i--) {
    if (rs.items[i].x === p.x && rs.items[i].y === p.y) {
      if (game.inventory.length < 5) {
        game.inventory.push(rs.items[i].type);
        rs.items.splice(i, 1);
      }
    }
  }
}

function tryOpenChest() {
  const rs = getRoomState();
  const p = game.player;
  for (const c of rs.chests) {
    if (!c.opened && c.x === p.x && c.y === p.y) {
      c.opened = true;
      if (game.inventory.length < 5) {
        const type = ITEM_TYPES[Math.floor(Math.random() * ITEM_TYPES.length)];
        game.inventory.push(type);
      }
    }
  }
}

function tryDoor() {
  const p = game.player;
  const map = getMap();
  if (map[p.y][p.x] !== 2) return;
  const key = p.x + ',' + p.y;
  const conn = DOOR_CONNECTIONS[game.currentRoom][key];
  if (!conn) return;
  const targetRoom = conn.room;
  game.currentRoom = targetRoom;
  game.visited[targetRoom] = true;
  if (!game.roomState[targetRoom].enemies) {
    game.roomState[targetRoom].enemies = ROOM_ENEMIES_INIT[targetRoom].map(createEnemy);
  }
  // Spawn boss on first visit to room 4
  if (targetRoom === 4 && !game.bossSpawned) {
    game.bossSpawned = true;
    game.boss = createBoss();
  }
  p.x = conn.sx;
  p.y = conn.sy;
  game.flashTimer = 8;
}

function movePlayer(dx, dy) {
  const p = game.player;
  if (p.moveCd > 0) return;
  if (dx < 0) p.facing = 'left';
  else if (dx > 0) p.facing = 'right';
  else if (dy < 0) p.facing = 'up';
  else if (dy > 0) p.facing = 'down';
  const nx = p.x + dx, ny = p.y + dy;
  if (isWalkable(nx, ny) && !enemyAt(nx, ny, null) && !bossOccupies(nx, ny)) {
    p.x = nx;
    p.y = ny;
    tryPickupItem();
    tryOpenChest();
    tryDoor();
  }
  p.moveCd = game.speedTimer > 0 ? 1 : 4;
}

function playerAttack() {
  const p = game.player;
  if (p.attackCd > 0) return;
  p.attackAnim = 6;
  p.attackCd = 15;
}

function doAttackDamage() {
  const p = game.player;
  const dirs = { left: [-1, 0], right: [1, 0], up: [0, -1], down: [0, 1] };
  const d = dirs[p.facing];
  const tx = p.x + d[0], ty = p.y + d[1];
  const rs = getRoomState();
  if (rs.enemies) {
    for (const e of rs.enemies) {
      if (e.alive && e.x === tx && e.y === ty) {
        const dmg = game.powerTimer > 0 ? 4 : 2;
        e.hp -= dmg;
        e.damaged = true;
        e.damageTimer = 6;
        if (e.hp <= 0) {
          e.alive = false;
          e.deathTimer = 8;
          game.kills++;
          dropItem(e.x, e.y);
        }
      }
    }
  }
  // Boss damage
  if (game.boss && game.boss.alive && game.currentRoom === 4) {
    const b = game.boss;
    if (tx >= b.x && tx <= b.x + 1 && ty >= b.y && ty <= b.y + 1) {
      const dmg = game.powerTimer > 0 ? 4 : 2;
      b.hp -= dmg;
      b.hitFlash = 6;
      if (b.hp <= 0) {
        b.alive = false;
        b.deathTimer = 20;
      }
    }
  }
}

function updateEnemies() {
  const rs = getRoomState();
  if (!rs.enemies) return;
  const p = game.player;
  for (const e of rs.enemies) {
    if (!e.alive) {
      if (e.deathTimer > 0) e.deathTimer--;
      continue;
    }
    if (e.damageTimer > 0) e.damageTimer--;
    e.moveTimer++;
    if (e.moveTimer >= e.moveInterval) {
      e.moveTimer = 0;
      let dx = 0, dy = 0;
      if (e.type === 'skeleton') {
        const adx = Math.abs(p.x - e.x), ady = Math.abs(p.y - e.y);
        if (adx >= ady) dx = p.x > e.x ? 1 : (p.x < e.x ? -1 : 0);
        else dy = p.y > e.y ? 1 : (p.y < e.y ? -1 : 0);
      } else {
        const r = Math.floor(Math.random() * 5);
        if (r === 0) dx = -1;
        else if (r === 1) dx = 1;
        else if (r === 2) dy = -1;
        else if (r === 3) dy = 1;
      }
      const nx = e.x + dx, ny = e.y + dy;
      if (isWalkable(nx, ny) && !(nx === p.x && ny === p.y) && !enemyAt(nx, ny, e) && !bossOccupies(nx, ny)) {
        e.x = nx;
        e.y = ny;
      }
    }
    if (e.x === p.x && e.y === p.y && p.dmgCd <= 0) {
      p.hp -= 1;
      p.dmgCd = 30;
      p.dmgFlash = 8;
      if (p.hp <= 0) game.gameOver = true;
    }
  }
}

// Boss 2x2 movement check
function bossCanMove(bx, by) {
  // Check all 4 tiles of the 2x2 area
  for (let ox = 0; ox < 2; ox++) {
    for (let oy = 0; oy < 2; oy++) {
      if (!isWalkable(bx + ox, by + oy)) return false;
    }
  }
  return true;
}

function getBossPhase() {
  if (!game.boss) return null;
  return BOSS_PHASE_CYCLE[game.boss.phaseIndex % BOSS_PHASE_CYCLE.length];
}

function updateBoss() {
  if (!game.boss || !game.boss.alive || game.currentRoom !== 4) return;
  const b = game.boss;
  const p = game.player;
  const phase = getBossPhase();

  if (b.hitFlash > 0) b.hitFlash--;
  if (b.contactCd > 0) b.contactCd--;

  // Phase timer
  b.phaseTimer--;
  if (b.phaseTimer <= 0) {
    // Advance phase
    b.phaseIndex++;
    const newPhase = BOSS_PHASE_CYCLE[b.phaseIndex % BOSS_PHASE_CYCLE.length];
    b.phaseTimer = BOSS_PHASE_DURATIONS[newPhase];
    b.summonedThisPhase = false;
    b.moveTimer = 0;
    // If entering charge, pick direction toward player
    if (newPhase === 'charge') {
      const pcx = p.x, pcy = p.y;
      const bcx = b.x + 0.5, bcy = b.y + 0.5;
      const adx = Math.abs(pcx - bcx), ady = Math.abs(pcy - bcy);
      if (adx >= ady) {
        b.chargeDir = { dx: pcx > bcx ? 1 : -1, dy: 0 };
      } else {
        b.chargeDir = { dx: 0, dy: pcy > bcy ? 1 : -1 };
      }
    }
  }

  // Phase behavior
  if (phase === 'chase') {
    b.moveTimer++;
    if (b.moveTimer >= 15) {
      b.moveTimer = 0;
      const bcx = b.x + 0.5, bcy = b.y + 0.5;
      const adx = Math.abs(p.x - bcx), ady = Math.abs(p.y - bcy);
      let dx = 0, dy = 0;
      if (adx >= ady) {
        dx = p.x > bcx ? 1 : (p.x < bcx ? -1 : 0);
      } else {
        dy = p.y > bcy ? 1 : (p.y < bcy ? -1 : 0);
      }
      const nx = b.x + dx, ny = b.y + dy;
      if (bossCanMove(nx, ny)) {
        b.x = nx;
        b.y = ny;
      }
    }
  } else if (phase === 'charge') {
    b.moveTimer++;
    if (b.moveTimer >= 3) {
      b.moveTimer = 0;
      const nx = b.x + b.chargeDir.dx, ny = b.y + b.chargeDir.dy;
      if (bossCanMove(nx, ny)) {
        b.x = nx;
        b.y = ny;
      }
      // Stop if hit wall (don't move, stays in place until phase ends)
    }
  } else if (phase === 'summon') {
    if (!b.summonedThisPhase && b.summonCount < 2) {
      b.summonedThisPhase = true;
      b.summonCount++;
      // Spawn 2 zombies at offsets from boss
      const rs = getRoomState();
      const spawns = [
        { x: b.x - 2, y: b.y },
        { x: b.x + 3, y: b.y } // size+1 = 2+1 = 3
      ];
      for (const sp of spawns) {
        if (isWalkable(sp.x, sp.y) && !enemyAt(sp.x, sp.y, null)) {
          rs.enemies.push(createEnemy({ type: 'zombie', x: sp.x, y: sp.y }));
        }
      }
    }
  }
  // rest: no movement

  // Boss contact damage to player
  if (b.contactCd <= 0) {
    if (p.x >= b.x && p.x <= b.x + 1 && p.y >= b.y && p.y <= b.y + 1) {
      p.hp -= 3;
      p.dmgCd = 30;
      p.dmgFlash = 8;
      b.contactCd = 30;
      if (p.hp <= 0) game.gameOver = true;
    }
  }
}

function updateBossDeath() {
  if (!game.boss || game.boss.alive) return;
  if (game.boss.deathTimer > 0) {
    game.boss.deathTimer--;
    if (game.boss.deathTimer <= 0) {
      game.victory = true;
      game.playTime = Math.floor((Date.now() - game.startTime) / 1000);
    }
  }
}

function update() {
  if (game.gameOver || game.victory) return;
  if (game.flashTimer > 0) { game.flashTimer--; return; }
  const p = game.player;
  game.frame++;
  if (p.moveCd > 0) p.moveCd--;
  if (p.attackCd > 0) p.attackCd--;
  if (p.dmgCd > 0) p.dmgCd--;
  if (p.dmgFlash > 0) p.dmgFlash--;
  if (game.speedTimer > 0) game.speedTimer--;
  if (game.powerTimer > 0) game.powerTimer--;

  if (p.attackAnim > 0) {
    p.attackAnim--;
    if (p.attackAnim === 1) doAttackDamage();
  }

  const k = game.keys;
  if (k['ArrowLeft']) movePlayer(-1, 0);
  else if (k['ArrowRight']) movePlayer(1, 0);
  else if (k['ArrowUp']) movePlayer(0, -1);
  else if (k['ArrowDown']) movePlayer(0, 1);

  updateEnemies();
  updateBoss();
  updateBossDeath();
}

const OX = Math.floor((500 - COLS * T) / 2);
const OY = 20;

function drawTile(x, y, tile) {
  const px = OX + x * T, py = OY + y * T;
  if (tile === 1) {
    ctx.fillStyle = '#646464';
    ctx.fillRect(px, py, T, T);
    ctx.fillStyle = '#505050';
    ctx.fillRect(px + 2, py + 2, T - 4, T - 4);
  } else if (tile === 0 || tile === 3) {
    ctx.fillStyle = '#323232';
    ctx.fillRect(px, py, T, T);
    ctx.fillStyle = '#3c3c3c';
    ctx.fillRect(px + 1, py + 1, T - 2, T - 2);
  } else if (tile === 2) {
    ctx.fillStyle = '#323232';
    ctx.fillRect(px, py, T, T);
    ctx.fillStyle = '#503c1e';
    ctx.fillRect(px + 1, py + 1, T - 2, T - 2);
    ctx.fillStyle = '#3a2a12';
    ctx.fillRect(px + 3, py + 3, T - 6, T - 6);
  }
}

function drawChest(c) {
  const px = OX + c.x * T, py = OY + c.y * T;
  ctx.fillStyle = '#323232';
  ctx.fillRect(px, py, T, T);
  ctx.fillStyle = '#3c3c3c';
  ctx.fillRect(px + 1, py + 1, T - 2, T - 2);
  if (!c.opened) {
    ctx.fillStyle = '#8b5a2b';
    ctx.fillRect(px + 4, py + 6, T - 8, T - 10);
    ctx.fillStyle = '#dcc832';
    ctx.fillRect(px + 4, py + 10, T - 8, 3);
    ctx.fillStyle = '#ffcc00';
    ctx.fillRect(px + 10, py + 9, 4, 5);
  } else {
    ctx.fillStyle = '#5a3a1a';
    ctx.fillRect(px + 4, py + 8, T - 8, T - 12);
    ctx.fillStyle = '#4a2a0a';
    ctx.fillRect(px + 4, py + 6, T - 8, 3);
  }
}

function drawPlayer() {
  const p = game.player;
  const px = OX + p.x * T, py = OY + p.y * T;
  const inset = 3;

  if (game.speedTimer > 0) {
    ctx.fillStyle = 'rgba(50, 220, 224, 0.3)';
    ctx.fillRect(px - 1, py - 1, T + 2, T + 2);
  }
  if (game.powerTimer > 0) {
    ctx.fillStyle = 'rgba(224, 150, 50, 0.3)';
    ctx.fillRect(px - 1, py - 1, T + 2, T + 2);
  }

  if (p.dmgFlash > 0 && p.dmgFlash % 2 === 0) {
    ctx.fillStyle = '#ff6464';
  } else {
    ctx.fillStyle = '#3264ff';
  }
  ctx.fillRect(px + inset, py + inset, T - inset * 2, T - inset * 2);

  ctx.fillStyle = '#ffffff';
  const ex = px + inset, ey = py + inset;
  const ew = T - inset * 2, eh = T - inset * 2;
  if (p.facing === 'right') {
    ctx.fillRect(ex + ew - 5, ey + 3, 3, 3);
    ctx.fillRect(ex + ew - 5, ey + eh - 6, 3, 3);
  } else if (p.facing === 'left') {
    ctx.fillRect(ex + 2, ey + 3, 3, 3);
    ctx.fillRect(ex + 2, ey + eh - 6, 3, 3);
  } else if (p.facing === 'up') {
    ctx.fillRect(ex + 3, ey + 2, 3, 3);
    ctx.fillRect(ex + ew - 6, ey + 2, 3, 3);
  } else {
    ctx.fillRect(ex + 3, ey + eh - 5, 3, 3);
    ctx.fillRect(ex + ew - 6, ey + eh - 5, 3, 3);
  }

  if (p.attackAnim > 0) {
    const dirs = { left: [-1, 0], right: [1, 0], up: [0, -1], down: [0, 1] };
    const d = dirs[p.facing];
    const ax = OX + (p.x + d[0]) * T, ay = OY + (p.y + d[1]) * T;
    const alpha = p.attackAnim / 6;
    ctx.fillStyle = `rgba(255, 200, 50, ${alpha * 0.7})`;
    ctx.fillRect(ax, ay, T, T);
  }
}

function drawEnemy(e) {
  if (!e.alive) {
    if (e.deathTimer > 0) {
      const alpha = e.deathTimer / 8;
      ctx.fillStyle = e.type === 'zombie' ? `rgba(50, 200, 50, ${alpha})` : `rgba(220, 220, 220, ${alpha})`;
      ctx.fillRect(OX + e.x * T + 3, OY + e.y * T + 3, T - 6, T - 6);
    }
    return;
  }
  const px = OX + e.x * T, py = OY + e.y * T;
  const inset = 4;

  if (e.damageTimer > 0 && e.damageTimer % 2 === 0) {
    ctx.fillStyle = '#ff4444';
  } else {
    ctx.fillStyle = e.type === 'zombie' ? '#32c832' : '#dcdcdc';
  }
  ctx.fillRect(px + inset, py + inset, T - inset * 2, T - inset * 2);

  ctx.fillStyle = e.type === 'zombie' ? '#003300' : '#333333';
  ctx.fillRect(px + 7, py + 7, 3, 3);
  ctx.fillRect(px + 14, py + 7, 3, 3);

  if (e.hp < e.maxHp) {
    const bw = T - 4;
    const hpRatio = e.hp / e.maxHp;
    ctx.fillStyle = '#440000';
    ctx.fillRect(px + 2, py - 4, bw, 3);
    ctx.fillStyle = '#cc0000';
    ctx.fillRect(px + 2, py - 4, bw * hpRatio, 3);
  }
}

function drawBoss() {
  const b = game.boss;
  if (!b || game.currentRoom !== 4) return;

  const bw = T * 2, bh = T * 2;
  const px = OX + b.x * T, py = OY + b.y * T;

  if (!b.alive) {
    // Death animation
    if (b.deathTimer > 0) {
      const progress = 1 - b.deathTimer / 20;
      const shrink = progress * T;
      if (b.deathTimer % 3 === 0) {
        ctx.fillStyle = '#ffffff';
      } else {
        ctx.fillStyle = '#b42828';
      }
      ctx.fillRect(px + shrink, py + shrink, bw - shrink * 2, bh - shrink * 2);
    }
    return;
  }

  const phase = getBossPhase();

  // Phase indicator dot above boss
  const dotX = px + bw / 2 - 3, dotY = py - 10;
  if (phase === 'chase') ctx.fillStyle = '#32c832';
  else if (phase === 'charge') ctx.fillStyle = '#ff3232';
  else if (phase === 'summon') ctx.fillStyle = '#a032c8';
  else ctx.fillStyle = '#888888';
  ctx.fillRect(dotX, dotY, 6, 6);

  // Body color based on phase and hit flash
  let bodyColor;
  if (b.hitFlash > 0 && b.hitFlash % 2 === 0) {
    bodyColor = '#ffffff';
  } else if (phase === 'charge') {
    bodyColor = '#dc3c1e';
  } else if (phase === 'summon') {
    bodyColor = '#a032c8';
  } else {
    bodyColor = '#b42828';
  }

  // Dark border
  ctx.fillStyle = '#501414';
  ctx.fillRect(px, py, bw, bh);

  // Body
  ctx.fillStyle = bodyColor;
  ctx.fillRect(px + 3, py + 3, bw - 6, bh - 6);

  // Eyes - two yellow rectangles
  ctx.fillStyle = '#ffcc00';
  ctx.fillRect(px + 9, py + 12, 7, 6);
  ctx.fillRect(px + 32, py + 12, 7, 6);

  // Pupils - black dots inside eyes
  ctx.fillStyle = '#000000';
  ctx.fillRect(px + 12, py + 13, 4, 4);
  ctx.fillRect(px + 35, py + 13, 4, 4);

  // Mouth - black rectangle with white teeth gaps
  ctx.fillStyle = '#000000';
  ctx.fillRect(px + 10, py + 28, 28, 10);
  // White teeth
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(px + 12 + i * 6, py + 29, 3, 4);
    ctx.fillRect(px + 12 + i * 6, py + 34, 3, 4);
  }
}

function drawItem(item) {
  const px = OX + item.x * T + 7, py = OY + item.y * T + 7;
  ctx.fillStyle = ITEM_COLORS[item.type];
  ctx.fillRect(px, py, 10, 10);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(px + 2, py + 2, 3, 3);
}

function drawBossHealthBar() {
  if (!game.boss || !game.boss.alive || game.currentRoom !== 4) return;
  const b = game.boss;
  const barW = 300, barH = 16;
  const barX = (500 - barW) / 2;
  const barY = 2;

  // Background
  ctx.fillStyle = '#501414';
  ctx.fillRect(barX, barY, barW, barH);
  // Fill
  const hpRatio = Math.max(0, b.hp / b.maxHp);
  ctx.fillStyle = '#c81e1e';
  ctx.fillRect(barX, barY, barW * hpRatio, barH);
  // Border
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(barX, barY, barW, barH);

  // Label
  ctx.fillStyle = '#ff4444';
  ctx.font = 'bold 11px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('DUNGEON BOSS', 250, barY + 12);

  // Phase text below
  const phase = getBossPhase();
  ctx.fillStyle = '#ffcc00';
  ctx.font = '10px monospace';
  ctx.fillText('Phase: ' + phase.toUpperCase(), 250, barY + barH + 10);
  ctx.textAlign = 'left';
}

function drawHUD() {
  const p = game.player;
  ctx.font = '14px monospace';

  // Health bar
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.strokeRect(10, 380, 104, 14);
  ctx.fillStyle = '#440000';
  ctx.fillRect(12, 382, 100, 10);
  ctx.fillStyle = '#cc0000';
  ctx.fillRect(12, 382, 100 * (p.hp / p.maxHp), 10);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('HP: ' + p.hp + '/' + p.maxHp, 120, 393);

  // Kills
  ctx.fillText('Kills: ' + game.kills, 220, 393);

  // Attack cooldown bar
  if (p.attackCd > 0) {
    ctx.fillStyle = '#444400';
    ctx.fillRect(10, 370, 60, 5);
    ctx.fillStyle = '#cccc00';
    ctx.fillRect(10, 370, 60 * (1 - p.attackCd / 15), 5);
  }

  // Effect timers
  let ty = 370;
  if (game.speedTimer > 0) {
    ctx.fillStyle = '#32dce0';
    ctx.fillText('Speed: ' + game.speedTimer, 300, ty);
    ty -= 14;
  }
  if (game.powerTimer > 0) {
    ctx.fillStyle = '#e09632';
    ctx.fillText('Power: ' + game.powerTimer, 300, ty);
  }

  // Room name centered (only if no boss health bar)
  if (!(game.boss && game.boss.alive && game.currentRoom === 4)) {
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.fillText(ROOM_NAMES[game.currentRoom], 250, 14);
    ctx.textAlign = 'left';
  }

  // Inventory bar
  const invY = 380;
  const slotW = 18, slotGap = 2;
  const totalInvW = 5 * (slotW + slotGap) - slotGap;
  const invStartX = 250 - totalInvW / 2;
  for (let i = 0; i < 5; i++) {
    const sx = invStartX + i * (slotW + slotGap);
    ctx.strokeStyle = '#666666';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, invY - 40, slotW, slotW);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(sx + 1, invY - 39, slotW - 2, slotW - 2);
    ctx.fillStyle = '#666666';
    ctx.font = '10px monospace';
    ctx.fillText((i + 1).toString(), sx + 2, invY - 42);
    if (i < game.inventory.length) {
      ctx.fillStyle = ITEM_COLORS[game.inventory[i]];
      ctx.fillRect(sx + 4, invY - 35, 10, 10);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(sx + 5, invY - 34, 3, 3);
    }
  }
  ctx.font = '14px monospace';

  drawMinimap();
  drawBossHealthBar();
}

function drawMinimap() {
  const mmX = 380, mmY = 22;
  const mmW = 110, mmH = 54;
  const rw = 22, rh = 16;
  const gap = 2;

  ctx.fillStyle = 'rgba(10, 10, 20, 0.85)';
  ctx.fillRect(mmX, mmY, mmW, mmH);
  ctx.strokeStyle = '#666666';
  ctx.lineWidth = 1;
  ctx.strokeRect(mmX, mmY, mmW, mmH);

  for (let i = 0; i < 5; i++) {
    if (!game.visited[i]) continue;
    const mp = MINIMAP_POS[i];
    const rx = mmX + 4 + mp.mx * (rw + gap);
    const ry = mmY + 4 + mp.my * (rh + gap);

    if (i === game.currentRoom) {
      ctx.strokeStyle = '#cccc00';
      ctx.lineWidth = 2;
      ctx.strokeRect(rx - 1, ry - 1, rw + 2, rh + 2);
      ctx.fillStyle = '#ffffff';
    } else {
      ctx.fillStyle = '#666666';
    }
    ctx.fillRect(rx, ry, rw, rh);
    ctx.lineWidth = 1;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.75)';
  ctx.fillRect(0, 0, 500, 400);
  ctx.fillStyle = '#cc0000';
  ctx.font = 'bold 40px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', 250, 170);
  ctx.fillStyle = '#ffffff';
  ctx.font = '20px monospace';
  ctx.fillText('Kills: ' + game.kills, 250, 210);
  ctx.font = '16px monospace';
  ctx.fillText('Press SPACE to restart', 250, 250);
  ctx.textAlign = 'left';
}

function drawVictory() {
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, 500, 400);

  ctx.textAlign = 'center';

  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 48px monospace';
  ctx.fillText('YOU WIN!', 250, 130);

  ctx.fillStyle = '#ffffff';
  ctx.font = '18px monospace';
  const mins = Math.floor(game.playTime / 60);
  const secs = game.playTime % 60;
  ctx.fillText('Time: ' + mins + 'm ' + secs + 's', 250, 190);
  ctx.fillText('Enemies Defeated: ' + game.kills, 250, 220);
  ctx.fillText('Items Used: ' + game.itemsUsed, 250, 250);

  ctx.fillStyle = '#aaaaaa';
  ctx.font = '14px monospace';
  ctx.fillText('Press SPACE to play again', 250, 300);

  ctx.textAlign = 'left';
}

function drawFlash() {
  if (game.flashTimer > 0) {
    const alpha = game.flashTimer / 8;
    ctx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.6})`;
    ctx.fillRect(0, 0, 500, 400);
  }
}

function draw() {
  ctx.fillStyle = '#0b0b13';
  ctx.fillRect(0, 0, 500, 400);

  const map = getMap();
  const rs = getRoomState();

  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      drawTile(x, y, map[y][x]);
    }
  }

  for (const c of rs.chests) {
    drawChest(c);
  }

  for (const item of rs.items) {
    drawItem(item);
  }

  // Draw enemies
  if (rs.enemies) {
    for (const e of rs.enemies) {
      drawEnemy(e);
    }
  }

  // Draw boss
  drawBoss();

  // Draw player
  drawPlayer();

  drawHUD();

  drawFlash();

  if (game.gameOver) drawGameOver();
  if (game.victory) drawVictory();
}

// Input handling
document.addEventListener('keydown', e => {
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) {
    e.preventDefault();
  }
  game.keys[e.code] = true;

  if (e.code === 'Space') {
    if (game.gameOver || game.victory) {
      initGame();
    } else {
      playerAttack();
    }
  }

  // Item hotkeys 1-5
  const num = parseInt(e.key);
  if (num >= 1 && num <= 5) {
    useItem(num - 1);
  }
});

document.addEventListener('keyup', e => {
  game.keys[e.code] = false;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  game.touchStart = { x: touch.clientX, y: touch.clientY, time: Date.now() };
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (!game.touchStart) return;
  const touch = e.changedTouches[0];
  const dx = touch.clientX - game.touchStart.x;
  const dy = touch.clientY - game.touchStart.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  const elapsed = Date.now() - game.touchStart.time;

  if (game.gameOver || game.victory) {
    initGame();
    game.touchStart = null;
    return;
  }

  if (dist < 15 || elapsed < 100) {
    // Tap = attack
    playerAttack();
  } else {
    // Swipe = move
    if (Math.abs(dx) > Math.abs(dy)) {
      movePlayer(dx > 0 ? 1 : -1, 0);
    } else {
      movePlayer(0, dy > 0 ? 1 : -1);
    }
  }
  game.touchStart = null;
}, { passive: false });

// Game loop
initGame();
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const elapsed = timestamp - lastTime;
  if (elapsed < FPS_INTERVAL) return;
  lastTime = timestamp - (elapsed % FPS_INTERVAL);
  update();
  draw();
}
requestAnimationFrame(gameLoop);
</script>
