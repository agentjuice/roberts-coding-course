site_name: "Robert's Coding Course"
site_description: "Learn Python and build games — from basics to a dungeon crawler"
site_url: https://robertcoding.com/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - navigation.sections

  icon:
    logo: material/sword
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - toc:
      permalink: false
      toc_depth: 0

nav:
  - Home: index.md
  - "Getting Started":
    - "Lesson 1 — The Basics": lessons/01-the-basics/lesson.md
    - "Lesson 2 — Conditions": lessons/02-conditions/lesson.md
    - "Lesson 3 — Loops": lessons/03-loops/lesson.md
    - "Lesson 4 — Lists": lessons/04-lists/lesson.md
  - "Project 1: Connect 4":
    - "Lesson 5 — Terminal Version": lessons/05-connect4-v1/lesson.md
    - "Lesson 6 — Functions": lessons/06-connect4-v2-functions/lesson.md
    - "Lesson 7 — Pygame": lessons/07-connect4-v3-pygame/lesson.md
    - "Lesson 8 — Animation": lessons/08-connect4-v4-animation/lesson.md
    - "Lesson 9 — Pygame + Functions": lessons/09-connect4-v5-pygame-functions/lesson.md
  - "Project 2: Snake":
    - "Lesson 10 — Snake Game": lessons/10-snake-v1/lesson.md
    - "Lesson 11 — Classes & OOP": lessons/11-snake-v2-classes/lesson.md
  - "Project 3: Dungeon Crawler":
    - "Lesson 12 — The Hero": lessons/12-dungeon-v1-hero/lesson.md
    - "Lesson 13 — Enemies": lessons/13-dungeon-v2-enemies/lesson.md
    - "Lesson 14 — Combat": lessons/14-dungeon-v3-combat/lesson.md
    - "Lesson 15 — Loot & Items": lessons/15-dungeon-v4-loot/lesson.md
    - "Lesson 16 — Multiple Rooms": lessons/16-dungeon-v5-rooms/lesson.md
    - "Lesson 17 — The Boss": lessons/17-dungeon-v6-boss/lesson.md
    - "Lesson 18 — Sprites & Art": lessons/18-dungeon-v7-sprites/lesson.md
    - "Lesson 19 — Sound & Music": lessons/19-dungeon-v8-sound/lesson.md
    - "Lesson 20 — Procedural Generation": lessons/20-dungeon-v9-procgen/lesson.md
    - "Lesson 21 — Polish & Second Level": lessons/21-dungeon-v10-polish/lesson.md
    - "Lesson 22 — Co-op Mode": lessons/22-dungeon-v11-coop/lesson.md

extra:
  social: []

extra_css:
  - stylesheets/gamer6.css




