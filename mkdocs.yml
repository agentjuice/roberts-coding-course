site_name: "Robert's Coding Course"
site_description: "Learn Python and build games — from basics to a dungeon crawler"
site_url: https://robertcoding.com/

theme:
  name: material
  palette:
    scheme: slate
    primary: deep purple
    accent: amber
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  icon:
    logo: material/sword
  font:
    text: Inter
    code: JetBrains Mono

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - "Lesson 1 — The Basics": lessons/01-the-basics/lesson.md
    - "Lesson 2 — Loops, Conditions & Lists": lessons/02-loops-conditions-lists/lesson.md
  - "Project 1: Connect 4":
    - "Lesson 3 — Terminal Version": lessons/03-connect4-v1/lesson.md
    - "Lesson 4 — Functions": lessons/04-connect4-v2-functions/lesson.md
    - "Lesson 5 — Pygame": lessons/05-connect4-v3-pygame/lesson.md
    - "Lesson 6 — Animation": lessons/06-connect4-v4-animation/lesson.md
    - "Lesson 7 — Pygame + Functions": lessons/07-connect4-v5-pygame-functions/lesson.md
  - "Project 2: Snake":
    - "Lesson 8 — Snake Game": lessons/08-snake-v1/lesson.md
    - "Lesson 9 — Classes & OOP": lessons/09-snake-v2-classes/lesson.md
  - "Project 3: Dungeon Crawler":
    - "Lesson 10 — The Hero": lessons/10-dungeon-v1-hero/lesson.md
    - "Lesson 11 — Enemies": lessons/11-dungeon-v2-enemies/lesson.md
    - "Lesson 12 — Combat": lessons/12-dungeon-v3-combat/lesson.md
    - "Lesson 13 — Loot & Items": lessons/13-dungeon-v4-loot/lesson.md
    - "Lesson 14 — Multiple Rooms": lessons/14-dungeon-v5-rooms/lesson.md
    - "Lesson 15 — The Boss": lessons/15-dungeon-v6-boss/lesson.md
    - "Lesson 16 — Sprites & Art": lessons/16-dungeon-v7-sprites/lesson.md
    - "Lesson 17 — Sound & Music": lessons/17-dungeon-v8-sound/lesson.md
    - "Lesson 18 — Procedural Generation": lessons/18-dungeon-v9-procgen/lesson.md
    - "Lesson 19 — Polish & Second Level": lessons/19-dungeon-v10-polish/lesson.md
    - "Lesson 20 — Co-op Mode": lessons/20-dungeon-v11-coop/lesson.md

extra:
  social: []

extra_css:
  - stylesheets/extra.css
